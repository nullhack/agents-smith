<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="smith banner">

  <!-- Background: matrix void -->
  <rect width="1200" height="300" fill="#0F1117"/>

  <!-- S logo mark -->
  <g transform="translate(132,-24) scale(3.2)">
    <rect x="20" y="16" width="60" height="8"  fill="#00FF41" opacity="0.65"/>
    <rect x="20" y="32" width="38" height="8"  fill="#00FF41" opacity="0.85"/>
    <rect x="20" y="44" width="60" height="12" fill="#00FF41"/>
    <rect x="42" y="60" width="38" height="8"  fill="#00FF41" opacity="0.85"/>
    <rect x="20" y="76" width="60" height="8"  fill="#00FF41" opacity="0.65"/>
  </g>

  <!-- "mith" — natural kerning, matching S height -->
  <text
    x="398" y="247"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="228"
    font-weight="700"
    fill="#FFFFFF"
    letter-spacing="2"
    text-anchor="start">mith</text>

  <!-- Tagline — centred on canvas -->
  <text
    x="600" y="282"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="18"
    font-weight="400"
    fill="#C0C0C0"
    letter-spacing="5"
    text-anchor="middle">Clone AI agent configurations into any project.</text>

</svg>